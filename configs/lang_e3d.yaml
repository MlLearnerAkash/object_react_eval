# Lang-E3D evaluation config
# Uses LangGeoNetV2 + joint GNM to navigate from language instructions
path_dataset: './data/'
path_models: ''
path_results: './out/results/'

# episode/task settings
start_idx: 0
step_idx: 1
end_idx: -1  # -1 means all episodes present in h5_path

reverse: False
task_type: "original"
use_gt_localization: True
env: "sim"

split: "val"
threshold_goal_distance: 1.0
max_start_distance: "hard"
max_steps: 300

exp_name: "lang_e3d_eval"

run_list: ''
path_run: ''

# controller and mapping params
method: 'learnt'
segmentor: 'fast_sam'
goal_source: 'lang_e3d'
graph_filename: null
infer_depth: False
infer_traversable: False

# lang_e3d-specific
joint_checkpoint: '/data/ws/VLN-CE/controller/object_react/train/checkpoints/joint/best_joint.pth'
h5_path: '/media/opervu-user/Data2/ws/data_langgeonet_e3d_action/e3d_train.h5'

# logging and display
log_wandb: False
log_robot: True
debug: False
except_exit: False

plot: False
save_vis: False

cull_qry_instances: False
cull_map_instances: False

sim:
  hfov: 120
  width: 320
  height: 240
  sensor_height: 0.4
  sensor_height_map: 1.31

goal_gen:
  textLabels: []
  map_segmentor_name: "fast_sam"
  matcher_name: "lightglue"
  map_matcher_name: "lightglue"
  geometric_verification: True
  match_area: False
  edge_weight_str: "e3d"
  goalNodeIdx: null
  use_goal_nbrs: False
  plan_da_nbrs: False
  preplan_to_goals_only: False
  rewrite_graph_with_allPathLengths: False
  loc_radius: 16
  subsample_ref: 2

controller:
  config_file: "configs/controller/object_react_controller.yaml"
  # following only used with real_remote
  v_min: 0.05
  v_max: 0.2
  w_min: -0.3
  w_max: 0.3